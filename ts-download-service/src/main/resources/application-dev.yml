    username: ry
    password: rCX74MxW6Ks457zF
  old-clickhouse:
    url: jdbc:clickhouse://YOUR_OLD_CK_HOST:8123/ts?socket_timeout=600000
    username: ts
    password: 6b52a53a13ab190c
  batch-size: 50000
  parallel: 3

# 本地文件存储配置（开发环境）
local:
  file:
    # 开发环境本地路径
    base-path: D:/ts-download-files
    # 开发环境域名
    server-domain: http://localhost:8080
    # 文件访问路径前缀
    access-prefix: /files
    # 开发环境启用本地存储
    enabled: true

